<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Forum</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <header>
        {{ template "navbar" . }}
    </header>

    <main>
        <section id="profile-section">
            <h1>{{ .User.Username }}</h1>
            <p><strong>Bio:</strong> {{ .User.Bio }}</p>

            <div>
                <h2>Informations</h2>
                <p><strong>Email:</strong> {{ .User.Email }}</p>
                <p><strong>Membre depuis:</strong> {{ .User.CreatedAt }}</p>
            </div>

            <div>
                <form action="/profile/update" method="POST">
                    <label for="bio">Bio:</label>

                    <label>
                        <input type="email" name="email" placeholder="Email" required value="{{ .Email }}">
                    </label>

                    <label>
                        <input type="name" name="username" placeholder="Nom d'utilisateur" required>
                    </label> {{ .Username }} </input>

                    <textarea id="bio" name="bio" rows="4" required>{{ .Bio }}</textarea>

                    <input type="submit" value="Modifier">
                </form>
            </div>
        </section>
    </main>

    <button onclick="location.href='/auth/logout'">Déconnexion</button>

    <footer>
        {{ template "footer" . }}
    </footer>
</body>
</html>
